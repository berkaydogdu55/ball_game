<!DOCTYPE html>
<html>
<head>
    <title>game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 2px solid #fff; max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
       const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");


canvas.width = 400;
canvas.height = 600;


let x = canvas.width / 2;
let y = canvas.height - 30;
let dx = 2; 
let dy = -2; 
let ballRadius = 10;
let paddleHeight = 15;
let paddleWidth = 90;
let paddleX = (canvas.width - paddleWidth) / 2;


document.addEventListener("touchmove", (e) => {
    let touch = e.touches[0];
    let relativeX = touch.clientX - canvas.offsetLeft;
    if(relativeX > 0 && relativeX < canvas.width) {
        paddleX = relativeX - paddleWidth / 2;
    }
}, { passive: false });

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
    
    
    ctx.beginPath();
    ctx.arc(x, y, ballRadius, 0, Math.PI*2);
    ctx.fillStyle = "#00FF00";
    ctx.fill();
    ctx.closePath();

    
    ctx.fillStyle = "#fff";
    ctx.fillRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);

    
    if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
    if(y + dy < ballRadius) dy = -dy;
    else if(y + dy > canvas.height - ballRadius - 10) {
        if(x > paddleX && x < paddleX + paddleWidth) {
            dy = -dy;
            dx *= 1.1;
            dy *= 1.1;
        } else {
            alert("Game Over :'(");
            document.location.reload();
        }
    }

    x += dx;
    y += dy;
    requestAnimationFrame(draw); 
}

draw();
    </script>
</body>
</html>
